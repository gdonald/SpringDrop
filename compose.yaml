services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: springdrop
      POSTGRES_USER: springdrop
      POSTGRES_PASSWORD: springdrop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
