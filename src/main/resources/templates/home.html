<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${siteName}">SpringDrop</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}" th:text="${siteName}">SpringDrop</a>
  </div>
</nav>

<main class="container py-5">
  <div class="row">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-body">
          <h1 class="card-title h3" th:text="${siteName}">SpringDrop</h1>
          <p class="card-text">A Drupal-style content platform on Spring.</p>
          <div th:replace="~{fragments/actions :: edit(@{/admin})}"></div>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
